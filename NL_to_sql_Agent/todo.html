<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --danger: #e17055;
            --success: #00b894;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #dfe6e9;
            --shadow: 0 4px 24px rgba(0,0,0,.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        header p {
            color: var(--text-light);
            margin-top: 4px;
            font-size: .95rem;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-bar input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            outline: none;
            transition: border-color .2s;
            background: var(--card);
        }

        .input-bar input:focus {
            border-color: var(--primary-light);
        }

        .input-bar button {
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }

        .input-bar button:hover { background: #5b4cdb; }
        .input-bar button:active { transform: scale(.97); }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filters button {
            flex: 1;
            padding: 8px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
            color: var(--text-light);
            font-weight: 500;
        }

        .filters button.active {
            border-color: var(--primary);
            color: var(--primary);
            background: #f0edff;
        }

        .filters button:hover:not(.active) {
            border-color: var(--primary-light);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: .85rem;
            color: var(--text-light);
            padding: 0 4px;
        }

        .stats .clear-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
        }

        .stats .clear-btn:hover { text-decoration: underline; }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: opacity .3s, transform .3s;
            animation: slideIn .3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .todo-item.removing {
            opacity: 0;
            transform: translateX(40px);
        }

        .todo-item .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all .2s;
        }

        .todo-item .checkbox:hover {
            border-color: var(--primary-light);
        }

        .todo-item.done .checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .todo-item.done .checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid #fff;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        .todo-item .text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-item.done .text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .todo-item .delete-btn {
            background: none;
            border: none;
            color: var(--border);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: color .2s;
            flex-shrink: 0;
        }

        .todo-item .delete-btn:hover { color: var(--danger); }

        .empty {
            text-align: center;
            padding: 48px 0;
            color: var(--text-light);
        }

        .empty .icon { font-size: 2.5rem; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>Todo List</h1>
        <p id="dateDisplay"></p>
    </header>

    <div class="input-bar">
        <input id="todoInput" type="text" placeholder="添加新任务…" autocomplete="off">
        <button id="addBtn">添加</button>
    </div>

    <div class="filters">
        <button data-filter="all" class="active">全部</button>
        <button data-filter="active">待完成</button>
        <button data-filter="done">已完成</button>
    </div>

    <div class="stats">
        <span id="statsText"></span>
        <button class="clear-btn" id="clearDone" style="display:none">清除已完成</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>
    <div class="empty" id="emptyState" style="display:none">
        <div class="icon">&#128203;</div>
        <p>暂无任务</p>
    </div>
</div>

<script>
const STORAGE_KEY = 'todo-list-data';
let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentFilter = 'all';

const $input    = document.getElementById('todoInput');
const $list     = document.getElementById('todoList');
const $stats    = document.getElementById('statsText');
const $clearBtn = document.getElementById('clearDone');
const $empty    = document.getElementById('emptyState');
const $date     = document.getElementById('dateDisplay');

$date.textContent = new Date().toLocaleDateString('zh-CN', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
});

function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
}

function addTodo() {
    const text = $input.value.trim();
    if (!text) return;
    todos.unshift({ id: Date.now(), text, done: false });
    $input.value = '';
    save();
    render();
}

function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.done = !t.done;
    save();
    render();
}

function deleteTodo(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
        el.classList.add('removing');
        setTimeout(() => {
            todos = todos.filter(t => t.id !== id);
            save();
            render();
        }, 280);
    }
}

function clearDone() {
    todos = todos.filter(t => !t.done);
    save();
    render();
}

function getFiltered() {
    if (currentFilter === 'active') return todos.filter(t => !t.done);
    if (currentFilter === 'done')   return todos.filter(t => t.done);
    return todos;
}

function render() {
    const filtered = getFiltered();
    const activeCount = todos.filter(t => !t.done).length;
    const doneCount   = todos.filter(t => t.done).length;

    $stats.textContent = `共 ${todos.length} 项，待完成 ${activeCount} 项`;
    $clearBtn.style.display = doneCount ? 'inline' : 'none';
    $empty.style.display = filtered.length ? 'none' : 'block';

    $list.innerHTML = filtered.map(t => `
        <li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <div class="checkbox" onclick="toggleTodo(${t.id})"></div>
            <span class="text">${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="删除">&times;</button>
        </li>
    `).join('');
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

document.getElementById('addBtn').addEventListener('click', addTodo);
$input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
$clearBtn.addEventListener('click', clearDone);

document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelector('.filters .active').classList.remove('active');
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
    });
});

render();
</script>
</body>
</html>
